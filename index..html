<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Finds</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }

        /* Styl przycisku z poświatą (OlafReps style) */
        .red-glow-btn {
            background-color: #ff0000;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .red-glow-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }

        /* Karty w menu bocznym */
        .menu-card {
            background: #111111;
            border: 1px solid #1a1a1a;
            transition: all 0.2s ease;
        }
        .menu-card:hover { background: #161616; border-color: #333; transform: translateX(5px); }

        .icon-box {
            background: #1a1a1a;
            width: 40px; height: 40px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 10px; color: #666;
        }
        .menu-card:hover .icon-box { color: #ff0000; }

        /* Agenci */
        .btn-k { background: #ff5c5c; border-radius: 10px; font-weight: 900; }
        .btn-us { background: #3b82f6; border-radius: 10px; font-weight: 900; }
        .logo-us-tag { border: 1.5px solid white; padding: 0 3px; border-radius: 4px; font-size: 0.65rem; margin-right: 4px; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        
        <div class="flex items-center gap-4">
            <a href="https://discord.gg/DTb5mkpNuH" target="_blank" class="hidden md:block red-glow-btn px-6 py-2 rounded-full font-bold text-xs uppercase tracking-widest">Join Discord</a>
            <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition">
                <i class="fa-solid fa-bars-staggered text-xl"></i>
            </button>
        </div>
    </nav>

    <main class="min-h-screen pt-32">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center px-4 py-20">
                <h1 class="text-6xl md:text-[90px] font-black leading-tight mb-6 tracking-tighter uppercase">
                    The Ultimate<br><span class="text-red-600">Rep</span> Community
                </h1>
                <p class="max-w-xl text-gray-500 text-lg mb-12 font-medium">
                    Najlepsze znaleziska, sprawdzeni agenci i największa społeczność. Dołącz do Maks Reps już teraz.
                </p>
                <div class="flex flex-col md:flex-row gap-5">
                    <button @click="view = 'products'" class="red-glow-btn px-12 py-4 rounded-2xl font-black text-lg uppercase">Przeglądaj Produkty</button>
                    <a href="https://discord.gg/DTb5mkpNuH" target="_blank" class="bg-white/5 border border-white/10 px-12 py-4 rounded-2xl font-black text-lg hover:bg-white/10 transition uppercase">Discord</a>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section class="max-w-7xl mx-auto px-6 pb-20">
                <h2 class="text-4xl font-black uppercase mb-12">Najnowsze <span class="text-red-600">Findsy</span></h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <template x-for="product in products">
                        <div class="menu-card p-4 rounded-[2.5rem] flex flex-col group">
                            <div class="relative aspect-square mb-6 overflow-hidden rounded-[2rem] bg-[#0c0c0c]">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-full text-sm font-black text-red-500 border border-white/10" x-text="product.price"></div>
                            </div>
                            <h3 class="font-bold text-lg mb-6 px-2" x-text="product.name"></h3>
                            <div class="grid grid-cols-2 gap-3 px-1">
                                <a :href="product.kakobuy" target="_blank" class="btn-k py-3 flex items-center justify-center text-[10px] uppercase hover:brightness-110 transition">
                                    <span class="italic text-sm mr-1">K</span> Kakobuy
                                </a>
                                <a :href="product.usfans" target="_blank" class="btn-us py-3 flex items-center justify-center text-[10px] uppercase hover:brightness-110 transition">
                                    <span class="logo-us-tag">US</span> Fans
                                </a>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] bg-[#080808] p-8 shadow-2xl border-l border-white/5 overflow-y-auto"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="translate-x-full"
             x-transition:enter-end="translate-x-0">
            
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Menu</h2>
                <button @click="openMenu = false" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-xl hover:bg-red-600 transition">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <div class="space-y-3 mb-12">
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest ml-1 mb-4">Główne</p>
                
                <a href="https://discord.gg/DTb5mkpNuH" target="_blank" class="menu-card flex items-center justify-between p-4 rounded-2xl group border-red-600/30 bg-red-600/5">
                    <div class="flex items-center gap-4">
                        <div class="icon-box !text-red-500 !bg-red-500/10">
                            <i class="fa-brands fa-discord"></i>
                        </div>
                        <span class="font-bold text-white">Discord</span>
                    </div>
                    <span class="text-[10px] font-black bg-red-600 px-2 py-1 rounded text-white uppercase">Join</span>
                </a>

                <button @click="view = 'products'; openMenu = false" class="w-full menu-card flex items-center justify-between p-4 rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-solid fa-magnifying-glass"></i></div>
                        <span class="font-bold">Browse Finds</span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-[10px] text-gray-700"></i>
                </button>

                <a href="https://discord.gg/DTb5mkpNuH" target="_blank" class="menu-card flex items-center justify-between p-4 rounded-2xl group">
                    <div class="flex items-center gap-4">
                        <div class="icon-box"><i class="fa-solid fa-file-invoice"></i></div>
                        <span class="font-bold">Spreadsheet</span>
                    </div>
                    <i class="fa-solid fa-link text-[10px] text-gray-700"></i>
                </a>
            </div>

            <div class="space-y-4">
                <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest ml-1">Ustawienia</p>
                <div class="menu-card p-5 rounded-3xl space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-gray-400">Język</span>
                        <div class="flex gap-2">
                            <img src="https://flagcdn.com/w40/pl.png" class="w-7 rounded-sm border border-red-600 p-0.5 cursor-pointer">
                            <img src="https://flagcdn.com/w40/gb.png" class="w-7 rounded-sm opacity-30 cursor-pointer">
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-sm font-bold text-gray-400">Waluta</span>
                        <div class="flex gap-1 bg-black p-1 rounded-lg">
                            <button class="px-3 py-1 text-[10px] font-black rounded-md bg-white/10">PLN</button>
                            <button class="px-3 py-1 text-[10px] font-black rounded-md text-gray-600">USD</button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home',
                openMenu: false,
                products: [
                    {
                        name: "Numeris",
                        price: "180 PLN",
                        image: "https://i.imgur.com/vHqB0uR.png",
                        kakobuy: "https://kakobuy.com/register?inviteCode=TWOJKOD",
                        usfans: "https://usfans.com/register?inviteCode=TWOJKOD"
                    },
                    {
                        name: "Jordan 4 Retro Black Cat",
                        price: "420 CNY",
                        image: "https://images.stockx.com/360/Air-Jordan-4-Retro-Black-Cat-2020/Images/Air-Jordan-4-Retro-Black-Cat-2020/Lv2/img01.jpg?auto=compress&w=480",
                        kakobuy: "https://discord.gg/DTb5mkpNuH",
                        usfans: "https://discord.gg/DTb5mkpNuH"
                    }
                ]
            }
        }
    </script>
</body>
</html>
