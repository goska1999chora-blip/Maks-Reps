<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; overflow-x: hidden; }
        
        .hero-title { font-size: 48px; line-height: 1.1; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        @media (min-width: 768px) { .hero-title { font-size: 80px; } }
        
        .btn-main-red { background-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); color: white; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; cursor: pointer; }
        .btn-main-red:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }

        .menu-sidebar { background-color: #080808; border-left: 1px solid #111; }
        .menu-tile { background-color: #111111; border: 1px solid #1a1a1a; border-radius: 16px; padding: 16px; transition: 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        
        .agent-btn { border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; transition: 0.2s; padding: 12px 16px; width: 100%; display: flex; align-items: center; gap: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-kako { background-color: #ff5c5c; color: white; }
        .btn-usf { background-color: #3b82f6; color: white; }
        .btn-acb { background-color: #00d1b2; color: #000; }
        
        .flag-icon { width: 28px; cursor: pointer; opacity: 0.3; transition: 0.2s; border: 2px solid transparent; padding: 1px; }
        .flag-icon.active { opacity: 1; border-color: #ff0000; border-radius: 4px; }

        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* QC Grid Styl */
        .qc-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 24px; }
        .qc-item { position: relative; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); aspect-ratio: 1/1; background: #111; cursor: pointer; }
        .qc-item img { width: 100%; height: 100%; object-fit: cover; transition: 0.3s; }
        .qc-item:hover img { transform: scale(1.05); }

        /* Fullscreen Modal */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; align-items: center; justify-content: center; padding: 20px; }
    </style>
</head>
<body x-data="siteHandler()">

    <div x-show="fullImg" class="modal-overlay" @click="fullImg = null" x-transition x-cloak>
        <button class="absolute top-10 right-10 text-white text-3xl"><i class="fa-solid fa-xmark"></i></button>
        <img :src="fullImg" class="max-w-full max-h-full rounded-xl shadow-2xl">
    </div>

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition text-white">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center py-20 animate-fade">
                <h1 class="hero-title mb-8" x-html="t.heroTitle"></h1>
                <p class="text-gray-500 max-w-xl mb-16 text-lg font-medium" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-5 w-full max-w-sm md:max-w-none justify-center">
                    <button @click="view = 'products'" class="btn-main-red px-12 py-5 w-full md:w-auto" x-text="t.browseBtn"></button>
                    <button @click="window.open(discordLink)" class="btn-main-black px-12 py-5 w-full md:w-auto" x-text="t.discordBtn"></button>
                </div>
            </section>
        </template>

        <template x-if="view === 'qc'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl text-center">
                    <div class="w-16 h-16 bg-red-600/10 rounded-2xl flex items-center justify-center text-red-600 text-3xl mx-auto mb-6">
                        <i class="fa-solid fa-camera"></i>
                    </div>
                    <h2 class="text-3xl font-black uppercase mb-4">Quality <span class="text-red-600">Checks</span></h2>
                    <p class="text-gray-500 mb-8 font-medium" x-text="t.qcDesc"></p>
                    
                    <div class="relative group">
                        <input type="text" x-model="qcUrl" @keydown.enter="fetchQC()" placeholder="Wklej link (Weidian, Taobao, 1688...)" 
                               class="w-full p-6 rounded-2xl mb-4 bg-white/5 border border-white/10 outline-none focus:border-red-600/50 transition text-center">
                    </div>

                    <button @click="fetchQC()" class="btn-main-red py-5 px-10 rounded-xl w-full flex items-center justify-center gap-3" :disabled="loadingQC">
                        <template x-if="!loadingQC">
                            <span class="font-black">POBIERZ ZDJĘCIA</span>
                        </template>
                        <template x-if="loadingQC">
                            <i class="fa-solid fa-circle-notch animate-spin text-xl"></i>
                        </template>
                    </button>

                    <div class="qc-grid" x-show="qcImages.length > 0" x-cloak>
                        <template x-for="img in qcImages" :key="img">
                            <div class="qc-item" @click="fullImg = img">
                                <img :src="img" loading="lazy">
                                <div class="absolute inset-0 bg-black/20 hover:bg-transparent transition"></div>
                            </div>
                        </template>
                    </div>

                    <div x-show="qcError" class="mt-8 p-4 bg-red-600/10 border border-red-600/20 rounded-xl text-red-500 font-bold" x-text="qcError" x-cloak></div>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section class="max-w-7xl mx-auto animate-fade">
                <h2 class="text-4xl font-black uppercase mb-12"><span x-text="t.latest"></span> <span class="text-red-600">Finds</span></h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <template x-for="product in products">
                        <div class="bg-[#111] p-4 rounded-[2.5rem] border border-white/5 flex flex-col group transition hover:border-white/10">
                            <div class="relative aspect-square mb-6 overflow-hidden rounded-[2rem] bg-[#0c0c0c]">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-full text-sm font-black text-red-500 border border-white/10" 
                                     x-text="currency === 'PLN' ? product.pricePLN + ' PLN' : product.priceUSD + ' USD'"></div>
                            </div>
                            <h3 class="font-bold text-lg mb-6 px-2 truncate" x-text="product.name"></h3>
                            <div class="grid grid-cols-2 gap-3 px-1 mt-auto">
                                <a :href="product.kakobuy" target="_blank" class="agent-btn btn-kako py-3 flex items-center justify-center text-[10px] uppercase">Kakobuy</a>
                                <a :href="product.usfans" target="_blank" class="agent-btn btn-usf py-3 flex items-center justify-center text-[10px] uppercase">USFans</a>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
             <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-red-600/10 rounded-xl flex items-center justify-center text-red-600 text-2xl">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <h2 class="text-3xl font-black uppercase tracking-tighter" x-text="t.convTitle"></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium" x-text="t.convDesc"></p>
                    <input type="text" x-model="inputUrl" @input="convertLink()" :placeholder="t.convPlace" class="w-full p-6 rounded-2xl mb-8 transition text-lg border border-white/10 bg-white/5 outline-none focus:border-red-600/50">
                    <div class="space-y-3" x-show="botResult" x-cloak>
                        <div class="grid grid-cols-1 gap-4">
                            <a :href="botResult.kako" target="_blank" class="agent-btn btn-kako"><span class="flex-grow text-center">Kakobuy</span></a>
                            <a :href="botResult.acb" target="_blank" class="agent-btn btn-acb"><span class="flex-grow text-center">ACBuy</span></a>
                            <a :href="botResult.usf" target="_blank" class="agent-btn btn-usf"><span class="flex-grow text-center">USFans</span></a>
                        </div>
                    </div>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] menu-sidebar p-8 shadow-2xl" x-transition>
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-3xl font-black">MENU</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="space-y-4">
                <div @click="view = 'products'; openMenu = false" class="menu-tile"><span class="font-bold uppercase">Browse Finds</span></div>
                <div @click="view = 'converter'; openMenu = false" class="menu-tile"><span class="font-bold uppercase text-red-500">Link Converter</span></div>
                <div @click="view = 'qc'; openMenu = false" class="menu-tile"><span class="font-bold uppercase">Quality Checks</span></div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', openMenu: false, lang: 'pl', currency: 'PLN', 
                qcUrl: '', qcImages: [], loadingQC: false, qcError: '', fullImg: null,
                inputUrl: '', botResult: null,
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T', acbuy: 'KV2WLD' },
                translations: {
                    pl: {
                        heroTitle: 'THE ULTIMATE<br><span class="text-red-600">REP</span> COMMUNITY',
                        heroSub: 'Najlepsze znaleziska i narzędzia. Dołącz do nas.',
                        browseBtn: 'Przeglądaj Produkty',
                        discordBtn: 'Discord',
                        latest: 'Najnowsze',
                        mainSection: 'Główne',
                        convTitle: 'Bot Converter',
                        convDesc: 'Konwertuj linki na afiliacyjne.',
                        convPlace: 'Wklej link...',
                        qcDesc: 'Wklej link do przedmiotu, aby zobaczyć zdjęcia QC z magazynu.',
                        qcBtn: 'POBIERZ ZDJĘCIA QC'
                    }
                },
                t: {},
                products: [{ name: "Numeris", pricePLN: "180", priceUSD: "45", image: "https://file.uufinds.com/product/2026/04/15/2044313412956188673/major/2c92808a9d6ac29f019d8fffa56c38c0.webp", kakobuy: "#", usfans: "#" }],
                init() { this.t = this.translations.pl; },

                async fetchQC() {
                    if (!this.qcUrl) return;
                    this.loadingQC = true;
                    this.qcError = '';
                    this.qcImages = [];
                    
                    try {
                        const response = await fetch(`https://api.xms4192.workers.dev/qc?url=${encodeURIComponent(this.qcUrl)}`);
                        const data = await response.json();
                        
                        if (data && data.images && data.images.length > 0) {
                            this.qcImages = data.images;
                        } else {
                            this.qcError = 'Brak zdjęć QC dla tego linku.';
                        }
                    } catch (e) {
                        this.qcError = 'Błąd serwera. Spróbuj ponownie później.';
                    } finally {
                        this.loadingQC = false;
                    }
                },

                convertLink() {
                    let url = this.inputUrl.trim();
                    if (!url) { this.botResult = null; return; }
                    let id = "", acSource = "TB", clean = url;
                    if (url.includes("taobao.com")) { id = url.match(/id=(\d+)/)?.[1]; }
                    else if (url.includes("weidian.com")) { id = url.match(/itemID=(\d+)/)?.[1]; acSource = "WD"; }

                    if (id) {
                        this.botResult = {
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(url)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/1/${id}?ref=${this.aff.usfans}`,
                            acb: `https://m.acbuy.com/product?id=${id}&source=${acSource}&inviteCode=${this.aff.acbuy}`
                        };
                    }
                }
            }
        }
    </script>
</body>
</html>
