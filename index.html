<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maks Reps</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
    scroll-behavior: smooth;
}

body {
    background: radial-gradient(circle at center, #2b0000 0%, #000 70%);
    color: white;
}

/* NAVBAR */
.navbar {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 15px 60px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.logo span {
    color: red;
}

.nav-links {
    display: flex;
    gap: 30px;
}

.nav-links a {
    text-decoration: none;
    color: #ccc;
    transition: 0.3s;
}

.nav-links a:hover {
    color: red;
}

/* BUTTON */
.btn {
    padding: 10px 20px;
    border-radius: 30px;
    border: none;
    background: red;
    color: white;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
}

/* HERO */
.hero {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    flex-direction: column;
    padding: 0 20px;
}

.hero h1 {
    font-size: 64px;
    margin-bottom: 20px;
}

.hero p {
    color: #aaa;
    margin-bottom: 30px;
}

.buttons {
    display: flex;
    gap: 20px;
}

.secondary {
    background: transparent;
    border: 1px solid red;
}

/* SECTIONS */
.section {
    padding: 120px 60px;
}

.section h2 {
    margin-bottom: 30px;
}

/* PRODUCTS */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px,1fr));
    gap: 25px;
}

.card {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    transition: 0.3s;
    border: 1px solid #222;
}

.card:hover {
    transform: translateY(-5px);
    border-color: red;
}

/* SPREADSHEET */
iframe {
    width: 100%;
    height: 600px;
    border: none;
    border-radius: 15px;
}

/* TRACKING BOX */
.tracking-box {
    background: #111;
    padding: 20px;
    border-radius: 15px;
    max-width: 400px;
}

.tracking-box input {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 40px;
    color: #666;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">Maks<span>Reps</span></div>

    <div class="nav-links">
        <a href="#home">Home</a>
        <a href="#products">Products</a>
        <a href="#spreadsheet">Spreadsheet</a>
        <a href="#tracking">Tracking</a>
    </div>

    <button class="btn">Join Discord</button>
</div>

<!-- HERO -->
<section class="hero" id="home">
    <h1>The Ultimate Rep Community</h1>
    <p>Access the best spreadsheets, products and tools in one place.</p>

    <div class="buttons">
        <button class="btn" onclick="scrollToSection('products')">Browse Products</button>
        <button class="btn secondary" onclick="scrollToSection('spreadsheet')">Open Spreadsheet</button>
    </div>
</section>

<!-- PRODUCTS -->
<section class="section" id="products">
    <h2>Products</h2>

    <div class="grid">
        <div class="card">Sneakers</div>
        <div class="card">Clothing</div>
        <div class="card">Accessories</div>
        <div class="card">Best Finds</div>
    </div>
</section>

<!-- SPREADSHEET -->
<section class="section" id="spreadsheet">
    <h2>Spreadsheet</h2>

    <iframe
