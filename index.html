<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; overflow-x: hidden; }
        
        /* Twoje oryginalne efekty */
        .red-glow-btn { background-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.4); transition: all 0.3s ease; }
        .red-glow-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); }

        .menu-card { background: #111111; border: 1px solid #1a1a1a; transition: all 0.2s ease; cursor: pointer; }
        .menu-card:hover { background: #161616; border-color: #333; transform: translateX(5px); }

        .tool-card { background: #111111; border: 1px solid #1a1a1a; border-radius: 24px; padding: 2.5rem; }
        
        .icon-box { background: #1a1a1a; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; color: #666; }
        
        /* Kolory przycisków agentów */
        .btn-k { background: #ff5c5c; border-radius: 12px; font-weight: 900; color: white; transition: 0.2s; }
        .btn-us { background: #3b82f6; border-radius: 12px; font-weight: 900; color: white; transition: 0.2s; }
        .btn-ac { background: #00d1b2; border-radius: 12px; font-weight: 900; color: #000; transition: 0.2s; }
        
        .btn-k:hover, .btn-us:hover, .btn-ac:hover { opacity: 0.9; transform: scale(1.02); }

        input { background: rgba(255,255,255,0.05) !important; border: 1px solid rgba(255,255,255,0.1) !important; color: white !important; outline: none; }
        
        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition">
            <i class="fa-solid fa-bars-staggered text-xl text-white"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center px-4 py-20 animate-fade">
                <h1 class="text-6xl md:text-[90px] font-black leading-tight mb-6 tracking-tighter uppercase" x-html="t.heroTitle"></h1>
                <div class="flex flex-col md:flex-row gap-5 mt-8">
                    <button @click="view = 'products'" class="red-glow-btn px-12 py-4 rounded-2xl font-black text-lg uppercase" x-text="t.browseBtn"></button>
                    <button @click="view = 'converter'" class="bg-white/5 border border-white/10 px-12 py-4 rounded-2xl font-black text-lg hover:bg-white/10 transition uppercase">Link Converter</button>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section class="max-w-7xl mx-auto px-6 animate-fade">
                <h2 class="text-4xl font-black uppercase mb-12"><span x-text="t.latest"></span> <span class="text-red-600">Finds</span></h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <template x-for="product in products">
                        <div class="menu-card p-4 rounded-[2.5rem] flex flex-col group">
                            <div class="relative aspect-square mb-6 overflow-hidden rounded-[2rem] bg-[#0c0c0c]">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-full text-sm font-black text-red-500 border border-white/10" 
                                     x-text="currency === 'PLN' ? product.pricePLN + ' PLN' : product.priceUSD + ' USD'"></div>
                            </div>
                            <h3 class="font-bold text-lg mb-6 px-2 truncate" x-text="product.name"></h3>
                            <div class="grid grid-cols-2 gap-3 px-1">
                                <button @click="openConverted(product.url)" class="btn-k py-3 flex items-center justify-center text-[10px] uppercase">Kakobuy</button>
                                <button @click="openConverted(product.url)" class="btn-us py-3 flex items-center justify-center text-[10px] uppercase">USFans</button>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
            <section class="max-w-3xl mx-auto px-6 animate-fade">
                <div class="tool-card">
                    <div class="flex items-center gap-3 mb-2">
                        <i class="fa-solid fa-robot text-red-600 text-2xl"></i>
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Bot <span class="text-red-600">Converter</span></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium">Wklej link Taobao/Weidian/1688 – przekonwertuję go jak mój bot na Discordzie.</p>
                    
                    <input type="text" x-model="inputUrl" @input="botConvert()" placeholder="Wklej link tutaj..." class="w-full p-5 rounded-2xl mb-8 transition text-lg border border-white/10">
                    
                    <div class="space-y-4" x-show="botResult" x-cloak>
                        <div class="p-4 bg-white/5 rounded-xl border-l-4 border-red-600 mb-6">
                            <p class="text-[10px] font-black text-gray-500 uppercase">Wykryto Produkt:</p>
                            <p class="text-sm font-bold truncate text-white" x-text="botResult.cleanUrl"></p>
                        </div>

                        <div class="grid grid-cols-1 gap-3">
                            <a :href="botResult.kako" target="_blank" class="btn-k p-5 flex justify-between items-center group">
                                <span class="uppercase font-black text-sm tracking-widest">✨ Kup na Kakobuy</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </a>
                            <a :href="botResult.usf" target="_blank" class="btn-us p-5 flex justify-between items-center group">
                                <span class="uppercase font-black text-sm tracking-widest">🚀 Kup na USFans</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </a>
                            <a :href="botResult.acb" target="_blank" class="btn-ac p-5 flex justify-between items-center group">
                                <span class="uppercase font-black text-sm tracking-widest">📦 Kup na ACBuy</span>
                                <i class="fa-solid fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'qc'">
            <section class="max-w-3xl mx-auto px-6 animate-fade">
                <div class="tool-card text-center">
                    <h2 class="text-3xl font-black mb-2 uppercase text-white">Quality <span class="text-red-600">Checks</span></h2>
                    <p class="text-gray-500 mb-8">Wklej link, aby zobaczyć zdjęcia z magazynu.</p>
                    <input type="text" x-model="qcUrl" placeholder="Wklej link do przedmiotu..." class="w-full p-5 rounded-2xl mb-8 text-lg">
                    <a :href="'https://www.kakobuy.com/index/item/quality_inspection?url=' + encodeURIComponent(qcUrl)" target="_blank" class="bg-white text-black p-5 rounded-xl flex justify-center items-center w-full uppercase font-black" x-show="qcUrl">Sprawdź QC (Kakobuy)</a>
                </div>
            </section>
        </template>

        <template x-if="view === 'calculator'">
            <section class="max-w-3xl mx-auto px-6 animate-fade">
                <div class="tool-card">
                    <h2 class="text-3xl font-black mb-6 uppercase text-red-600">Ship Calculator</h2>
                    <div class="mb-10 max-w-sm">
                        <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 px-1">Waga (Gramy)</label>
                        <input type="number" x-model="weight" placeholder="4000" class="w-full p-5 rounded-2xl text-xl font-bold transition">
                    </div>
                    <div class="grid grid-cols-1 gap-4" x-show="weight > 0" x-cloak>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/5 flex justify-between items-center"><span class="font-black uppercase text-xs text-white">Kakobuy</span><span class="text-2xl font-black text-red-500" x-text="calcShipping(weight, 'kakobuy') + ' ' + currency"></span></div>
                        <div class="bg-white/5 p-6 rounded-3xl border border-white/5 flex justify-between items-center"><span class="font-black uppercase text-xs text-white">USFans</span><span class="text-2xl font-black text-blue-500" x-text="calcShipping(weight, 'usfans') + ' ' + currency"></span></div>
                    </div>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] bg-[#080808] p-8 shadow-2xl border-l border-white/5 overflow-y-auto" x-transition>
            <div class="flex justify-between items-center mb-10 text-white">
                <h2 class="text-2xl font-black uppercase">Menu</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="space-y-3 mb-10">
                <div @click="view = 'products'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-magnifying-glass"></i></div><span class="font-bold uppercase text-xs">Browse Finds</span></div>
                <div @click="view = 'converter'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-robot"></i></div><span class="font-bold uppercase text-xs">Link Converter</span></div>
                <div @click="view = 'qc'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-camera"></i></div><span class="font-bold uppercase text-xs">Quality Checks</span></div>
                <div @click="view = 'calculator'; openMenu = false" class="menu-card p-4 rounded-2xl flex items-center gap-4 text-white"><div class="icon-box"><i class="fa-solid fa-calculator"></i></div><span class="font-bold uppercase text-xs">Ship Calculator</span></div>
                <a :href="discordLink" target="_blank" class="menu-card p-4 rounded-2xl flex items-center gap-4 border-red-600/30 bg-red-600/5 text-white"><div class="icon-box !text-red-500"><i class="fa-brands fa-discord"></i></div><span class="font-bold uppercase text-xs">Discord</span></a>
            </div>

            <div class="border-t border-white/5 pt-8 text-white">
                <h3 class="text-[10px] font-black text-gray-500 uppercase tracking-[0.2em] mb-4">Ustawienia</h3>
                <div class="grid grid-cols-2 gap-3">
                    <button @click="toggleLang()" class="bg-white/5 p-4 rounded-xl text-xs font-bold border border-white/10 uppercase" x-text="'Język: ' + lang"></button>
                    <button @click="toggleCurrency()" class="bg-white/5 p-4 rounded-xl text-xs font-bold border border-white/10 uppercase" x-text="'Waluta: ' + currency"></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', openMenu: false, lang: 'PL', currency: 'PLN', inputUrl: '', weight: '', qcUrl: '',
                botResult: null,
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T', acbuy: 'KV2WLD' },
                t: {},
                translations: {
                    PL: { heroTitle: 'Premium<br><span class="text-red-600">Rep</span> Tools', browseBtn: 'Przeglądaj Sklep', latest: 'Najnowsze' },
                    EN: { heroTitle: 'Premium<br><span class="text-red-600">Rep</span> Tools', browseBtn: 'Browse Store', latest: 'Latest' }
                },
                // Twoje stare zdjęcia
                products: [
                    { name: "Trapstar Jacket", pricePLN: "240", priceUSD: "60", image: "https://photos.pandalabs.io/jacket-trapstar-black.jpg", url: "https://weidian.com/item.html?itemID=5279434461" },
                    { name: "AJ4 Black Cat", pricePLN: "190", priceUSD: "48", image: "https://photos.pandalabs.io/aj4-black-cat.jpg", url: "https://weidian.com/item.html?itemID=4477393523" }
                ],
                init() { this.t = this.translations[this.lang]; },
                toggleLang() { this.lang = this.lang === 'PL' ? 'EN' : 'PL'; this.t = this.translations[this.lang]; },
                toggleCurrency() { this.currency = this.currency === 'PLN' ? 'USD' : 'PLN'; },

                // LOGIKA TWOJEGO BOTA (Extract ID i Linki)
                botConvert() {
                    let url = this.inputUrl.trim().toLowerCase();
                    if (!url) { this.botResult = null; return; }

                    let data = null;
                    // Taobao
                    if (url.includes("taobao.com") || url.includes("tmall.com")) {
                        let m = url.match(/id=(\d+)/);
                        if (m) data = { id: m[1], usfType: "1", acType: "TB", clean: `https://item.taobao.com/item.htm?id=${m[1]}` };
                    } 
                    // Weidian
                    else if (url.includes("weidian.com")) {
                        let m = url.match(/(?:itemid|item_id|itemid=)(\d+)/i);
                        if (m) data = { id: m[1], usfType: "1", acType: "WD", clean: `https://weidian.com/item.html?itemID=${m[1]}` };
                    }
                    // 1688
                    else if (url.includes("1688.com")) {
                        let m = url.match(/(?:offer\/|id=)(\d+)/);
                        if (m) data = { id: m[1], usfType: "2", acType: "1688", clean: `https://detail.1688.com/offer/${m[1]}.html` };
                    }

                    if (data) {
                        this.botResult = {
                            cleanUrl: data.clean,
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(data.clean)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/${data.usfType}/${data.id}?inviteCode=${this.aff.usfans}`,
                            acb: `https://m.acbuy.com/product?id=${data.id}&source=${data.acType}&inviteCode=${this.aff.acbuy}`
                        };
                    } else { this.botResult = null; }
                },

                openConverted(url) {
                    this.inputUrl = url;
                    this.botConvert();
                    this.view = 'converter';
                },

                calcShipping(g, agent) {
                    let rate = this.currency === 'PLN' ? 1 : 0.25;
                    let base = agent === 'kakobuy' ? (45 + (g/1000 * 62)) : (42 + (g/1000 * 59));
                    return Math.round(base * rate);
                }
            }
        }
    </script>
</body>
</html>
