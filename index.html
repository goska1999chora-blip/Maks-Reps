<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; overflow-x: hidden; }
        
        .hero-title { font-size: 48px; line-height: 1.1; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        @media (min-width: 768px) { .hero-title { font-size: 80px; } }
        
        .btn-main-red { background-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); color: white; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .btn-main-black { background-color: #111111; color: white; border: 1px solid #222; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; }
        .btn-main-red:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }

        .menu-sidebar { background-color: #080808; border-l: 1px solid #111; }
        .menu-tile { background-color: #111111; border: 1px solid #1a1a1a; border-radius: 16px; padding: 16px; transition: 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .menu-tile:hover { background-color: #161616; border-color: #333; }
        .menu-icon-box { background-color: #1a1a1a; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #666; font-size: 18px; }

        .agent-btn { border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 12px; transition: 0.2s; padding: 14px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .btn-kako { background-color: #ff5c5c; color: white; }
        .btn-usf { background-color: #3b82f6; color: white; }
        .btn-acb { background-color: #00d1b2; color: #000; }
        
        .flag-icon { width: 28px; cursor: pointer; opacity: 0.3; transition: 0.2s; border: 2px solid transparent; padding: 1px; }
        .flag-icon.active { opacity: 1; border-color: #ff0000; border-radius: 4px; }

        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition text-white">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center py-20 animate-fade">
                <h1 class="hero-title mb-8" x-html="t.heroTitle"></h1>
                <p class="text-gray-500 max-w-xl mb-16 text-lg font-medium" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-5 w-full max-w-sm md:max-w-none justify-center">
                    <button @click="view = 'products'" class="btn-main-red px-12 py-5 w-full md:w-auto" x-text="t.browseBtn"></button>
                    <button @click="window.open(discordLink)" class="btn-main-black px-12 py-5 w-full md:w-auto" x-text="t.discordBtn"></button>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section class="max-w-7xl mx-auto animate-fade">
                <h2 class="text-4xl font-black uppercase mb-12"><span x-text="t.latest"></span> <span class="text-red-600">Finds</span></h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <template x-for="product in products">
                        <div class="bg-[#111] p-4 rounded-[2.5rem] border border-white/5 flex flex-col group transition hover:border-white/10">
                            <div class="relative aspect-square mb-6 overflow-hidden rounded-[2rem] bg-[#0c0c0c]">
                                <img :src="product.image" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                                <div class="absolute top-4 right-4 bg-black/80 backdrop-blur-md px-4 py-2 rounded-full text-sm font-black text-red-500 border border-white/10" 
                                     x-text="currency === 'PLN' ? product.pricePLN + ' PLN' : product.priceUSD + ' USD'"></div>
                            </div>
                            <h3 class="font-bold text-lg mb-6 px-2 truncate" x-text="product.name"></h3>
                            <div class="grid grid-cols-2 gap-3 px-1 mt-auto">
                                <a :href="product.kakobuy" target="_blank" class="agent-btn btn-kako py-3 flex items-center justify-center text-[10px] uppercase">Kakobuy</a>
                                <a :href="product.usfans" target="_blank" class="agent-btn btn-usf py-3 flex items-center justify-center text-[10px] uppercase">USFans</a>
                            </div>
                        </div>
                    </template>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-red-600/10 rounded-xl flex items-center justify-center text-red-600 text-2xl">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <h2 class="text-3xl font-black uppercase tracking-tighter" x-text="t.convTitle"></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium" x-text="t.convDesc"></p>
                    <input type="text" x-model="inputUrl" @input="convertLink()" :placeholder="t.convPlace" class="w-full p-6 rounded-2xl mb-8 transition text-lg border border-white/10 bg-white/5 outline-none focus:border-red-600/50">
                    <div class="space-y-4" x-show="botResult" x-cloak>
                        <div class="p-4 bg-white/5 rounded-xl border border-white/10 text-xs font-mono text-red-400 truncate" x-text="botResult.cleanUrl"></div>
                        <div class="grid grid-cols-1 gap-3">
                            <a :href="botResult.kako" target="_blank" class="agent-btn btn-kako"><span>Kakobuy</span><i class="fa-solid fa-arrow-right"></i></a>
                            <a :href="botResult.usf" target="_blank" class="agent-btn btn-usf"><span>USFans</span><i class="fa-solid fa-arrow-right"></i></a>
                            <a :href="botResult.acb" target="_blank" class="agent-btn btn-acb"><span>ACBuy</span><i class="fa-solid fa-arrow-right"></i></a>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'qc'">
            <section class="max-w-3xl mx-auto animate-fade text-center">
                <div class="p-10 bg-[#080808] border border-white/5 rounded-3xl">
                    <i class="fa-solid fa-camera text-red-600 text-4xl mb-4"></i>
                    <h2 class="text-3xl font-black uppercase mb-4">Quality <span class="text-red-600">Checks</span></h2>
                    <p class="text-gray-500 mb-8" x-text="t.qcDesc"></p>
                    <input type="text" x-model="qcUrl" placeholder="Wklej link do przedmiotu..." class="w-full p-6 rounded-2xl mb-8 bg-white/5 border border-white/10 outline-none">
                    <a :href="'https://www.kakobuy.com/index/item/quality_inspection?url=' + encodeURIComponent(qcUrl)" target="_blank" class="btn-main-red py-5 px-10 rounded-xl inline-block w-full" x-show="qcUrl" x-text="t.qcBtn"></a>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] menu-sidebar p-8 shadow-2xl overflow-y-auto" x-transition>
            <div class="flex justify-between items-center mb-12 text-white">
                <h2 class="text-3xl font-black uppercase tracking-tighter">MENU</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl hover:bg-red-600 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="mb-10">
                <p class="text-[10px] font-black text-gray-600 tracking-widest mb-4 uppercase" x-text="t.mainSection"></p>
                <div class="space-y-4">
                    <div @click="view = 'products'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-magnifying-glass"></i></div>
                            <span class="font-bold">Browse Finds</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-700 text-xs"></i>
                    </div>
                    <div class="menu-tile" @click="window.open(discordLink)">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box !bg-red-600/10 !text-red-600"><i class="fa-brands fa-discord"></i></div>
                            <span class="font-bold">Discord</span>
                        </div>
                        <span class="bg-red-600 text-[10px] font-black px-3 py-1.5 rounded-md uppercase" x-text="t.joinTag"></span>
                    </div>
                    <div @click="view = 'converter'; openMenu = false" class="menu-tile border-red-600/20 bg-red-600/5">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box !text-red-500"><i class="fa-solid fa-robot"></i></div>
                            <span class="font-bold">Link Converter</span>
                        </div>
                        <span class="text-[9px] font-black text-red-500 uppercase">BOT</span>
                    </div>
                    <div @click="view = 'qc'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-camera"></i></div>
                            <span class="font-bold">Quality Checks</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="border-t border-white/5 pt-8">
                <p class="text-[10px] font-black text-gray-600 tracking-widest mb-4 uppercase" x-text="t.settingsSection"></p>
                <div class="bg-[#111] p-6 rounded-2xl space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-sm" x-text="t.langLabel"></span>
                        <div class="flex gap-3">
                            <img src="https://flagcdn.com/w40/pl.png" @click="setLang('pl')" class="flag-icon" :class="lang === 'pl' && 'active'">
                            <img src="https://flagcdn.com/w40/gb.png" @click="setLang('en')" class="flag-icon" :class="lang === 'en' && 'active'">
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-sm" x-text="t.currencyLabel"></span>
                        <div class="flex bg-black p-1 rounded-lg border border-white/5 text-[10px] font-black">
                            <button @click="currency = 'PLN'" class="px-4 py-2 rounded-md" :class="currency === 'PLN' ? 'bg-red-600 text-white' : 'text-gray-600'">PLN</button>
                            <button @click="currency = 'USD'" class="px-4 py-2 rounded-md" :class="currency === 'USD' ? 'bg-red-600 text-white' : 'text-gray-600'">USD</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', openMenu: false, lang: 'pl', currency: 'PLN', inputUrl: '', botResult: null, qcUrl: '',
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T', acbuy: 'KV2WLD' },
                t: {},
                translations: {
                    pl: {
                        heroTitle: 'THE ULTIMATE<br><span class="text-red-600">REP</span> COMMUNITY',
                        heroSub: 'Najlepsze znaleziska, sprawdzeni agenci i największa społeczność. Dołącz do Maks Reps już teraz.',
                        browseBtn: 'Przeglądaj Produkty',
                        discordBtn: 'Discord',
                        latest: 'Najnowsze',
                        mainSection: 'Główne',
                        settingsSection: 'Ustawienia',
                        langLabel: 'Język',
                        currencyLabel: 'Waluta',
                        joinTag: 'Dołącz',
                        convTitle: 'Bot Converter',
                        convDesc: 'Wklej link, aby otrzymać wersję afiliacyjną dla 3 agentów jednocześnie.',
                        convPlace: 'Wklej link Taobao/Weidian/1688...',
                        qcDesc: 'Podejrzyj zdjęcia z magazynu agenta.',
                        qcBtn: 'SPRAWDŹ ZDJĘCIA QC'
                    },
                    en: {
                        heroTitle: 'THE ULTIMATE<br><span class="text-red-600">REP</span> COMMUNITY',
                        heroSub: 'Best finds, trusted agents, and the biggest community. Join Maks Reps now.',
                        browseBtn: 'Browse Products',
                        discordBtn: 'Discord',
                        latest: 'Latest',
                        mainSection: 'Main',
                        settingsSection: 'Settings',
                        langLabel: 'Language',
                        currencyLabel: 'Currency',
                        joinTag: 'Join',
                        convTitle: 'Bot Converter',
                        convDesc: 'Paste a link to get an affiliate version for 3 agents at once.',
                        convPlace: 'Paste Taobao/Weidian/1688 link...',
                        qcDesc: 'Preview warehouse photos from the agent.',
                        qcBtn: 'CHECK QC PHOTOS'
                    }
                },
                products: [
                    {
                        name: "Numeris",
                        pricePLN: "180",
                        priceUSD: "45",
                        image: "https://cdn.discordapp.com/attachments/1484846186153250898/1484846186652369029/pcitem1238871281-06220000019a9e195a380a23041a-unadjust_1080_1080.png?ex=69e3f786&is=69e2a606&hm=77bc1c07a0ac6f3283e9e17f72d0f7b9a9bc86dd61ee7a031677d35ec13c1262&",
                        kakobuy: "https://www.kakobuy.com/item/details?url=https%3A%2F%2Fweidian.com%2Fitem.html%3FitemID%3D7614479098&affcode=maksr3ps",
                        usfans: "https://www.usfans.com/product/3/7614479098/?ref=DJPZ6T"
                    },
                    {
                        name: "Spodnie ADWYSD",
                        pricePLN: "45",
                        priceUSD: "11",
                        image: "https://file.uufinds.com/product/2026/04/15/2044313412956188673/major/2c92808a9d6ac29f019d8fffa56c38c0.webp",
                        kakobuy: "https://ikako.vip/ejqfc",
                        usfans: "https://www.usfans.com/product/2/915690707683/?ref=DJPZ6T"
                    }
                ],
                init() { this.setLang(this.lang); },
                setLang(l) { this.lang = l; this.t = this.translations[l]; },
                
                convertLink() {
                    let url = this.inputUrl.trim();
                    if (!url) { this.botResult = null; return; }
                    let id = "", usfType = "1", acSource = "TB", clean = url;

                    if (url.includes("taobao.com") || url.includes("tmall.com")) {
                        let m = url.match(/id=(\d+)/);
                        if (m) { id = m[1]; acSource = "TB"; clean = `https://item.taobao.com/item.htm?id=${id}`; }
                    } else if (url.includes("weidian.com")) {
                        let m = url.match(/(?:itemid|item_id|itemID=)(\d+)/);
                        if (m) { id = m[1]; acSource = "WD"; clean = `https://weidian.com/item.html?itemID=${id}`; }
                    } else if (url.includes("1688.com")) {
                        let m = url.match(/(?:offer\/|id=)(\d+)/);
                        if (m) { id = m[1]; usfType = "2"; acSource = "1688"; clean = `https://detail.1688.com/offer/${id}.html`; }
                    }

                    if (id) {
                        this.botResult = {
                            cleanUrl: clean,
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(clean)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/${usfType}/${id}?ref=${this.aff.usfans}`,
                            acb: `https://m.acbuy.com/product?id=${id}&source=${acSource}&inviteCode=${this.aff.acbuy}`
                        };
                    }
                }
            }
        }
    </script>
</body>
</html>
