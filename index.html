<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; overflow-x: hidden; }
        
        /* Strona Główna (image_1.png) */
        .hero-title { font-size: 48px; line-height: 1.1; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        @media (min-width: 768px) { .hero-title { font-size: 80px; } }
        .hero-subtitle { color: #888; max-w: 600px; margin: 0 auto; font-weight: 500; }
        
        /* Przyciski Główne */
        .btn-main-red { background-color: #ff0000; color: white; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 14px; transition: 0.2s; }
        .btn-main-black { background-color: #111111; color: white; border: 1px solid #222; border-radius: 12px; font-weight: 800; text-transform: uppercase; font-size: 14px; transition: 0.2s; }

        /* Menu (image_0.png) */
        .menu-sidebar { background-color: #080808; border-l: 1px solid #111; }
        .menu-tile { background-color: #111111; border: 1px solid #1a1a1a; border-radius: 16px; padding: 16px; transition: 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; }
        .menu-tile:hover { background-color: #161616; border-color: #333; }
        .menu-icon-box { background-color: #1a1a1a; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #666; font-size: 18px; }
        .menu-tile-text { font-weight: 700; font-size: 15px; color: white; }

        /* Przyciski Agentów */
        .agent-btn { border-radius: 10px; font-weight: 900; text-transform: uppercase; font-size: 12px; transition: 0.2s; padding: 16px; width: 100%; display: flex; justify-content: space-between; align-items: center; }
        .btn-kako { background-color: #ff5c5c; color: white; }
        .btn-usf { background-color: #3b82f6; color: white; }
        .btn-acb { background-color: #00d1b2; color: #000; }
        
        .raw-box { background-color: #111; border: 1px solid #1a1a1a; border-radius: 12px; padding: 14px; font-family: monospace; font-size: 11px; color: #ff5c5c; }
        .flag-icon { width: 24px; cursor: pointer; opacity: 0.5; transition: 0.2s; }
        .flag-icon.active { opacity: 1; border: 2px solid #ff0000; border-radius: 2px; }

        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-10 h-10 flex items-center justify-center bg-white/5 rounded-xl text-white">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center py-20 animate-fade">
                <h1 class="hero-title mb-8">
                    THE<br>ULTIMATE<br><span class="text-red-600">REP</span><br>COMMUNITY
                </h1>
                <p class="hero-subtitle mb-16 text-lg" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-5 w-full max-w-sm md:max-w-none justify-center">
                    <button @click="view = 'products'" class="btn-main-red px-12 py-5 w-full md:w-auto">PRZEGLĄDAJ PRODUKTY</button>
                    <button @click="window.open(discordLink)" class="btn-main-black px-12 py-5 w-full md:w-auto">Discord</button>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
                    <div class="flex items-center gap-4 mb-2">
                        <i class="fa-solid fa-robot text-red-600 text-3xl"></i>
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Bot <span class="text-red-600">Converter</span></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium">Wklej link, aby otrzymać wersję afiliacyjną dla 3 agentów.</p>
                    
                    <input type="text" x-model="inputUrl" @input="convertLink()" placeholder="Wklej link Taobao/Weidian/1688..." class="w-full p-6 rounded-2xl mb-8 transition text-lg border border-white/10 bg-white/5 outline-none focus:border-red-600/50">
                    
                    <div class="space-y-4" x-show="botResult" x-cloak>
                        <div class="raw-box truncate" x-text="botResult.cleanUrl"></div>

                        <div class="grid grid-cols-1 gap-3">
                            <a :href="botResult.kako" target="_blank" class="agent-btn btn-kako group">
                                <span class="tracking-widest">KUP NA KAKOBUY</span>
                                <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition"></i>
                            </a>
                            <a :href="botResult.usf" target="_blank" class="agent-btn btn-usf group">
                                <span class="tracking-widest">KUP NA USFANS</span>
                                <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition"></i>
                            </a>
                            <a :href="botResult.acb" target="_blank" class="agent-btn btn-acb group">
                                <span class="tracking-widest">KUP NA ACBUY</span>
                                <i class="fa-solid fa-arrow-right group-hover:translate-x-1 transition"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'qc'">
            <section class="max-w-3xl mx-auto animate-fade text-center">
                <div class="p-10 bg-[#080808] border border-white/5 rounded-3xl">
                    <i class="fa-solid fa-camera text-red-600 text-4xl mb-4"></i>
                    <h2 class="text-3xl font-black uppercase mb-8">Quality <span class="text-red-600">Checks</span></h2>
                    <input type="text" x-model="qcUrl" placeholder="Wklej link do przedmiotu..." class="w-full p-6 rounded-2xl mb-8 bg-white/5 border border-white/10 outline-none">
                    <a :href="'https://www.kakobuy.com/index/item/quality_inspection?url=' + encodeURIComponent(qcUrl)" target="_blank" class="btn-main-red py-5 px-10 rounded-xl inline-block w-full" x-show="qcUrl">SPRAWDŹ ZDJĘCIA QC</a>
                </div>
            </section>
        </template>

        <template x-if="view === 'products'">
            <section class="max-w-7xl mx-auto animate-fade">
                <h2 class="text-4xl font-black uppercase mb-12">Najnowsze <span class="text-red-600">Finds</span></h2>
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    <template x-for="p in products">
                        <div class="bg-[#111] p-4 rounded-[2rem] border border-white/5">
                            <img :src="p.image" class="w-full aspect-square object-cover rounded-2xl mb-4">
                            <h3 class="font-bold mb-4" x-text="p.name"></h3>
                            <button @click="inputUrl = p.url; convertLink(); view = 'converter'" class="btn-main-red w-full py-3 text-xs">POBIERZ LINKI</button>
                        </div>
                    </template>
                </div>
            </section>
        </template>
    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] menu-sidebar p-8 shadow-2xl overflow-y-auto" x-transition>
            
            <div class="flex justify-between items-center mb-12 text-white">
                <h2 class="text-3xl font-black uppercase">MENU</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="mb-10">
                <p class="text-[10px] font-black text-gray-500 tracking-widest mb-4">GŁÓWNE</p>
                <div class="space-y-4">
                    <div @click="view = 'products'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-magnifying-glass"></i></div>
                            <span class="menu-tile-text">Browse Finds</span>
                        </div>
                        <i class="fa-solid fa-chevron-right text-gray-700 text-xs"></i>
                    </div>
                    <div class="menu-tile" @click="window.open(discordLink)">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box !bg-red-600/10 !text-red-600"><i class="fa-brands fa-discord"></i></div>
                            <span class="menu-tile-text">Discord</span>
                        </div>
                        <span class="bg-red-600 text-[10px] font-black px-3 py-1.5 rounded-md">DOŁĄCZ</span>
                    </div>
                    <div @click="view = 'converter'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-robot"></i></div>
                            <span class="menu-tile-text">Link Converter</span>
                        </div>
                    </div>
                    <div @click="view = 'qc'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-camera"></i></div>
                            <span class="menu-tile-text">Quality Checks</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="border-t border-white/5 pt-8">
                <p class="text-[10px] font-black text-gray-500 tracking-widest mb-4">USTAWIENIA</p>
                <div class="bg-[#111] p-6 rounded-2xl space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-sm">Język</span>
                        <div class="flex gap-3">
                            <img src="https://flagcdn.com/w40/pl.png" @click="lang = 'PL'" class="flag-icon" :class="lang === 'PL' && 'active'">
                            <img src="https://flagcdn.com/w40/gb.png" @click="lang = 'EN'" class="flag-icon" :class="lang === 'EN' && 'active'">
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-sm">Waluta</span>
                        <div class="flex bg-black p-1 rounded-lg border border-white/5 text-[10px] font-black">
                            <button @click="currency = 'PLN'" class="px-4 py-2 rounded-md" :class="currency === 'PLN' ? 'bg-red-600' : 'text-gray-600'">PLN</button>
                            <button @click="currency = 'USD'" class="px-4 py-2 rounded-md" :class="currency === 'USD' ? 'bg-red-600' : 'text-gray-600'">USD</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', openMenu: false, lang: 'PL', currency: 'PLN', inputUrl: '', botResult: null, qcUrl: '',
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T', acbuy: 'KV2WLD' },
                t: {
                    heroSub: 'Najlepsze znaleziska, sprawdzeni agenci i największa społeczność. Dołącz do Maks Reps już teraz.'
                },
                products: [
                    { name: "Trapstar Jacket", image: "https://photos.pandalabs.io/jacket-trapstar-black.jpg", url: "https://weidian.com/item.html?itemID=5279434461" }
                ],
                
                // LOGIKA BOTA
                convertLink() {
                    let url = this.inputUrl.trim();
                    if (!url) { this.botResult = null; return; }

                    let id = "";
                    let usfType = "1";
                    let acSource = "TB";
                    let clean = url;

                    if (url.includes("taobao.com") || url.includes("tmall.com")) {
                        let m = url.match(/id=(\d+)/);
                        if (m) { id = m[1]; acSource = "TB"; clean = `https://item.taobao.com/item.htm?id=${id}`; }
                    } else if (url.includes("weidian.com")) {
                        let m = url.match(/(?:itemID=)(\d+)/);
                        if (m) { id = m[1]; acSource = "WD"; clean = `https://weidian.com/item.html?itemID=${id}`; }
                    } else if (url.includes("1688.com")) {
                        let m = url.match(/(?:offer\/|id=)(\d+)/);
                        if (m) { id = m[1]; usfType = "2"; acSource = "1688"; clean = `https://detail.1688.com/offer/${id}.html`; }
                    }

                    if (id) {
                        this.botResult = {
                            cleanUrl: clean,
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(clean)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/${usfType}/${id}?inviteCode=${this.aff.usfans}`,
                            acb: `https://m.acbuy.com/product?id=${id}&source=${acSource}&inviteCode=${this.aff.acbuy}`
                        };
                    }
                }
            }
        }
    </script>
</body>
</html>
