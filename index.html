<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Pro Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }

        .tool-card {
            background: #111111;
            border: 1px solid #1a1a1a;
            border-radius: 32px;
            padding: 2.5rem;
        }

        input { 
            background: rgba(255,255,255,0.05) !important; 
            border: 1px solid rgba(255,255,255,0.1) !important; 
            color: white !important; 
            outline: none;
        }
        input:focus { border-color: #ff0000 !important; }

        /* Button Colors */
        .btn-kakobuy { background: #ff5c5c; }
        .btn-usfans { background: #3b82f6; }
        .btn-acbuy { background: #00d1b2; }
        .btn-raw { background: #333333; }
        
        .agent-tag { border: 1.5px solid white; padding: 0 4px; border-radius: 4px; font-size: 0.65rem; margin-right: 8px; font-weight: 900; }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="toolsHandler()">

    <nav class="w-full px-6 py-8 flex justify-center items-center border-b border-white/5">
        <div class="text-3xl font-black tracking-tighter uppercase cursor-default">
            MAKS<span class="text-red-600">REPS</span> TOOLS
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 py-12 space-y-10">
        
        <section class="tool-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 bg-red-600/10 text-red-600 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tight">Universal Converter</h2>
                    <p class="text-gray-500 text-sm font-medium">Wklej link od agenta lub ze sklepu (Weidian/Taobao/1688).</p>
                </div>
            </div>

            <div class="space-y-8">
                <input type="text" x-model="inputUrl" @input="convertLink()" placeholder="Wklej link tutaj..." 
                       class="w-full p-5 rounded-2xl text-lg transition shadow-inner">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4" x-show="rawUrl" x-cloak x-transition>
                    
                    <a :href="generateAgentLink('kakobuy')" target="_blank" class="btn-kakobuy p-5 rounded-2xl flex justify-between items-center hover:scale-[1.02] transition transform">
                        <span class="font-black uppercase text-xs tracking-widest text-white"><span class="italic text-lg mr-2">K</span> Kakobuy</span>
                        <i class="fa-solid fa-up-right-from-square opacity-50 text-white"></i>
                    </a>

                    <a :href="generateAgentLink('usfans')" target="_blank" class="btn-usfans p-5 rounded-2xl flex justify-between items-center hover:scale-[1.02] transition transform text-white">
                        <span class="font-black uppercase text-xs tracking-widest"><span class="agent-tag">US</span> USFans</span>
                        <i class="fa-solid fa-up-right-from-square opacity-50"></i>
                    </a>

                    <a :href="generateAgentLink('acbuy')" target="_blank" class="btn-acbuy p-5 rounded-2xl flex justify-between items-center hover:scale-[1.02] transition transform text-black">
                        <span class="font-black uppercase text-xs tracking-widest"><span class="agent-tag !border-black">AC</span> ACBuy</span>
                        <i class="fa-solid fa-up-right-from-square opacity-50 text-black"></i>
                    </a>

                    <div @click="copyToClipboard(rawUrl)" class="btn-raw p-5 rounded-2xl flex justify-between items-center cursor-pointer hover:bg-[#444] transition">
                        <span class="font-black uppercase text-xs tracking-widest text-gray-300"><i class="fa-solid fa-shop mr-2 text-sm"></i> RAW Shop Link</span>
                        <div class="flex items-center gap-2">
                             <span class="text-[9px] text-gray-500 uppercase font-bold" x-text="copied ? 'Copied!' : 'Click to copy'"></span>
                             <i class="fa-solid fa-copy opacity-50"></i>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section class="tool-card">
            <div class="flex items-center gap-4 mb-8">
                <div class="w-12 h-12 bg-blue-600/10 text-blue-500 rounded-2xl flex items-center justify-center text-xl">
                    <i class="fa-solid fa-calculator"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-black uppercase tracking-tight">Ship Calculator</h2>
                    <p class="text-gray-500 text-sm font-medium">Porównaj szacunkowe ceny wysyłki do Polski (PLN).</p>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-6 items-end">
                <div class="md:col-span-1">
                    <label class="block text-[10px] font-black text-gray-500 uppercase tracking-widest mb-3 px-1">Waga (Gramy)</label>
                    <input type="number" x-model="weight" placeholder="np. 4000" class="w-full p-5 rounded-2xl text-xl font-bold">
                </div>

                <div class="md:col-span-3 grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <p class="text-[9px] font-black text-red-500 uppercase mb-1 tracking-tighter">Kakobuy Estimate</p>
                        <p class="text-2xl font-black" x-text="calcShipping(weight, 'kakobuy') + ' PLN'"></p>
                    </div>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <p class="text-[9px] font-black text-blue-500 uppercase mb-1 tracking-tighter">USFans Estimate</p>
                        <p class="text-2xl font-black" x-text="calcShipping(weight, 'usfans') + ' PLN'"></p>
                    </div>
                    <div class="bg-white/5 p-5 rounded-3xl border border-white/5">
                        <p class="text-[9px] font-black text-teal-500 uppercase mb-1 tracking-tighter">ACBuy Estimate</p>
                        <p class="text-2xl font-black" x-text="calcShipping(weight, 'acbuy') + ' PLN'"></p>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer class="py-10 text-center text-gray-600 text-[10px] font-black uppercase tracking-[0.3em]">
        &copy; 2026 Maks Reps Community
    </footer>

    <script>
        function toolsHandler() {
            return {
                inputUrl: '',
                rawUrl: '',
                weight: '',
                copied: false,
                
                // TWOJE AKTUALNE LINKI AFILIACYJNE
                aff: {
                    kakobuy: 'maksr3ps',
                    usfans: 'DJPZ6T',
                    acbuy: 'KV2WLD'
                },

                convertLink() {
                    let url = this.inputUrl.trim();
                    if (!url) { this.rawUrl = ''; return; }

                    try {
                        // Sprawdź czy to link z parametrem url= (większość agentów tak przesyła linki zewnętrzne)
                        if (url.includes('url=')) {
                            const params = new URLSearchParams(url.split('?')[1]);
                            if (params.has('url')) {
                                this.rawUrl = decodeURIComponent(params.get('url'));
                                return;
                            }
                        }
                        
                        // Jeśli to link bezpośredni do sklepu
                        if (url.includes('weidian.com') || url.includes('taobao.com') || url.includes('1688.com') || url.includes('tmall.com')) {
                            this.rawUrl = url;
                        } else {
                            // Jeśli wklejono link agenta bez parametru url (np. wewnętrzny), traktujemy go jako wejście
                            this.rawUrl = url;
                        }
                    } catch (e) {
                        this.rawUrl = '';
                    }
                },

                generateAgentLink(agent) {
                    if (!this.rawUrl) return '#';
                    let encodedRaw = encodeURIComponent(this.rawUrl);

                    switch(agent) {
                        case 'kakobuy':
                            return `https://www.kakobuy.com/item/details?url=${encodedRaw}&affcode=${this.aff.kakobuy}`;
                        case 'usfans':
                            return `https://www.usfans.com/product/search?url=${encodedRaw}&ref=${this.aff.usfans}`;
                        case 'acbuy':
                            return `https://www.acbuy.com/product-detail?url=${encodedRaw}&ref=${this.aff.acbuy}`;
                        default:
                            return this.rawUrl;
                    }
                },

                calcShipping(g, agent) {
                    if (!g || g <= 0) return 0;
                    let kg = g / 1000;
                    
                    // Szacunkowe stawki (Opłata startowa + cena za kg)
                    if(agent === 'kakobuy') return Math.round(45 + (kg * 62));
                    if(agent === 'usfans') return Math.round(42 + (kg * 59));
                    if(agent === 'acbuy') return Math.round(40 + (kg * 61));
                },

                copyToClipboard(text) {
                    navigator.clipboard.writeText(text);
                    this.copied = true;
                    setTimeout(() => this.copied = false, 2000);
                }
            }
        }
    </script>
</body>
</html>
