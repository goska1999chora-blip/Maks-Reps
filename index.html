<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | The Ultimate Community</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: white;
            overflow-x: hidden;
        }

        .red-glow {
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.4);
        }

        .btn-smooth {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-smooth:hover {
            transform: translateY(-2px) scale(1.02);
            filter: brightness(1.2);
        }

        .btn-smooth:active {
            transform: scale(0.98);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }

        [x-cloak] { display: none !important; }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-4 flex justify-between items-center bg-black/50 backdrop-blur-md border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <a href="#" class="hover:text-white transition" x-text="t.home"></a>
            <a href="#" class="hover:text-white transition" x-text="t.products"></a>
            <a href="#" class="hover:text-white transition" x-text="t.tracking"></a>
        </div>

        <div class="flex items-center gap-4">
            <button @click="openMenu = true" class="p-2 hover:bg-white/10 rounded-lg transition">
                <i class="fa-solid fa-bars-staggered text-xl"></i>
            </button>
            <a href="https://discord.gg/TWOJLINK" class="hidden md:block bg-red-600 px-6 py-2 rounded-full font-bold red-glow btn-smooth">
                Join Discord
            </a>
        </div>
    </nav>

    <section class="relative min-h-screen flex flex-col items-center justify-center text-center px-4 pt-20">
        <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,_var(--tw-gradient-stops))] from-red-900/20 via-transparent to-transparent"></div>
        
        <h1 class="text-5xl md:text-8xl font-extrabold mb-6 tracking-tight" x-text="t.heroTitle"></h1>
        <p class="max-w-xl text-gray-400 text-lg mb-10" x-text="t.heroSub"></p>
        
        <div class="flex flex-col md:flex-row gap-4">
            <button class="bg-red-600 px-10 py-4 rounded-xl font-bold text-lg red-glow btn-smooth" x-text="t.browseBtn"></button>
            <button class="glass-card px-10 py-4 rounded-xl font-bold text-lg btn-smooth border border-white/10" x-text="t.joinBtn"></button>
        </div>
    </section>

    <div x-show="openMenu" 
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-300"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fixed inset-y-0 right-0 w-full md:w-96 bg-[#0a0a0a] z-[60] p-6 overflow-y-auto shadow-2xl border-l border-white/5" x-cloak>
        
        <div class="flex justify-between items-center mb-8">
            <h2 class="text-xl font-bold">Menu</h2>
            <button @click="openMenu = false" class="w-10 h-10 flex items-center justify-center glass-card rounded-lg">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="space-y-3">
            <template x-for="item in menuItems">
                <a :href="item.link" class="flex items-center justify-between p-4 glass-card rounded-xl btn-smooth group">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 rounded-lg bg-white/5 flex items-center justify-center group-hover:bg-red-600/20 transition">
                            <i :class="item.icon"></i>
                        </div>
                        <span class="font-medium" x-text="item.label[lang]"></span>
                    </div>
                    <i class="fa-solid fa-chevron-right text-xs text-gray-500"></i>
                </a>
            </template>
        </div>

        <div class="mt-10">
            <p class="text-xs font-bold text-gray-500 uppercase tracking-widest mb-4">Settings</p>
            
            <div class="glass-card p-4 rounded-xl mb-3">
                <div class="flex items-center justify-between mb-4">
                    <span class="text-sm">Language</span>
                    <div class="flex gap-2">
                        <button @click="setLang('en')" :class="lang === 'en' ? 'border-red-600 bg-red-600/20' : 'border-transparent'" class="border p-1 rounded transition">
                            <img src="https://flagcdn.com/w40/gb.png" class="w-6 rounded-sm" alt="EN">
                        </button>
                        <button @click="setLang('pl')" :class="lang === 'pl' ? 'border-red-600 bg-red-600/20' : 'border-transparent'" class="border p-1 rounded transition">
                            <img src="https://flagcdn.com/w40/pl.png" class="w-6 rounded-sm" alt="PL">
                        </button>
                    </div>
                </div>
            </div>

            <div class="glass-card p-4 rounded-xl">
                <div class="flex items-center justify-between">
                    <span class="text-sm">Currency</span>
                    <div class="flex gap-1 bg-black/40 p-1 rounded-lg">
                        <button class="px-3 py-1 text-xs rounded-md bg-white/10 font-bold">USD</button>
                        <button class="px-3 py-1 text-xs rounded-md text-gray-500">EUR</button>
                        <button class="px-3 py-1 text-xs rounded-md text-gray-500">PLN</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div x-show="openMenu" @click="openMenu = false" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[55]" x-cloak></div>

    <script>
        function siteHandler() {
            return {
                openMenu: false,
                lang: 'pl',
                t: {},
                translations: {
                    pl: {
                        home: 'Start',
                        products: 'Produkty',
                        tracking: 'Śledzenie',
                        heroTitle: 'Najlepsza Społeczność Reps',
                        heroSub: 'Design klasy premium. Czysty układ. Nowoczesne wizualizacje. Stworzone dla elity.',
                        browseBtn: 'Przeglądaj Produkty',
                        joinBtn: 'Dołącz do nas'
                    },
                    en: {
                        home: 'Home',
                        products: 'Products',
                        tracking: 'Tracking',
                        heroTitle: 'The Ultimate Rep Community',
                        heroSub: 'Premium design. Clean layout. Modern visuals. Built to look elite even as a static concept.',
                        browseBtn: 'Browse Products',
                        joinBtn: 'Join Community'
                    }
                },
                menuItems: [
                    { label: {pl: 'Arkusz (Spreadsheet)', en: 'Spreadsheet'}, icon: 'fa-solid fa-file-lines', link: '#' },
                    { label: {pl: 'Znaleziska', en: 'Browse Finds'}, icon: 'fa-solid fa-magnifying-glass', link: '#' },
                    { label: {pl: 'Kontrola Jakości (QC)', en: 'Quality Checks'}, icon: 'fa-solid fa-square-check', link: '#' },
                    { label: {pl: 'Outfity', en: 'Outfits'}, icon: 'fa-solid fa-shirt', link: '#' },
                    { label: {pl: 'Sprzedawcy', en: 'Sellers'}, icon: 'fa-solid fa-shop', link: '#' },
                    { label: {pl: 'Śledzenie paczek', en: 'Tracking'}, icon: 'fa-solid fa-truck-fast', link: '#' },
                    { label: {pl: 'Konwerter Linków', en: 'Link Converter'}, icon: 'fa-solid fa-link', link: '#' }
                ],
                init() {
                    this.t = this.translations[this.lang];
                },
                setLang(l) {
                    this.lang = l;
                    this.t = this.translations[l];
                }
            }
        }
    </script>
</body>
</html>
