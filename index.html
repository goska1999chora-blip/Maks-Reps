<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <title>Maks Reps</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 40px;
      text-align: center;
      background: #151515;
      font-size: 32px;
      font-weight: bold;
    }

    .container {
      padding: 30px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }

    .card img {
      width: 100%;
      border-radius: 10px;
    }

    .btn {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #5865F2;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }

    .discord {
      text-align: center;
      margin: 20px;
    }

  </style>
</head>

<body>

<header>Maks Reps</header>

<div class="discord">
  <a class="btn" href="https://discord.gg/9wmc8BsBvf" target="_blank">
    Dołącz do mojego community
  </a>
</div>

<div class="container">

  <!-- ITEM 1 -->
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="item">
    <h3> Numerisy </h3>
    <p> Fajne buty na lato</p>
    <a class="btn" href="#">https://www.kakobuy.com/item/details?url=https%3A%2F%2Fweidian.com%2Fitem.html%3FitemID%3D7614479098&affcode=maksr3ps</a>
  </div>

  <!-- ITEM 2 -->
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="item">
    <h3>Item 2</h3>
    <p>Opis produktu</p>
    <a class="btn" href="#">Kup teraz</a>
  </div>

  <!-- ITEM 3 -->
  <div class="card">
    <img src="https://via.placeholder.com/300" alt="item">
    <h3>Item 3</h3>
    <p>Opis produktu</p>
    <a class="btn" href="#">Kup teraz</a>
  </div>

</div>

</body>
</html>
