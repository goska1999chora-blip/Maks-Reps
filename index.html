<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maks Reps | Premium Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000000; color: white; overflow-x: hidden; }
        
        .hero-title { font-size: 48px; line-height: 1.1; font-weight: 900; text-transform: uppercase; letter-spacing: -2px; }
        @media (min-width: 768px) { .hero-title { font-size: 80px; } }
        
        .btn-main-red { background-color: #ff0000; box-shadow: 0 0 20px rgba(255, 0, 0, 0.3); color: white; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; cursor: pointer; border: none; }
        .btn-main-black { background-color: #111111; color: white; border: 1px solid #222; border-radius: 12px; font-weight: 800; text-transform: uppercase; transition: 0.2s; cursor: pointer; }
        .btn-main-red:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); }

        .menu-sidebar { background-color: #080808; border-left: 1px solid #111; }
        .menu-tile { background-color: #111111; border: 1px solid #1a1a1a; border-radius: 16px; padding: 16px; transition: 0.2s; cursor: pointer; display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
        .menu-tile:hover { background-color: #161616; border-color: #333; }
        .menu-icon-box { background-color: #1a1a1a; width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; border-radius: 12px; color: #666; font-size: 18px; }

        .agent-btn { border-radius: 12px; font-weight: 900; text-transform: uppercase; font-size: 12px; transition: 0.2s; padding: 12px 16px; width: 100%; display: flex; align-items: center; gap: 14px; border: 1px solid rgba(255,255,255,0.05); }
        .btn-kako { background-color: #ff5c5c; color: white; }
        .btn-usf { background-color: #3b82f6; color: white; }
        
        .flag-icon { width: 28px; cursor: pointer; opacity: 0.3; transition: 0.2s; border: 2px solid transparent; padding: 1px; }
        .flag-icon.active { opacity: 1; border-color: #ff0000; border-radius: 4px; }

        [x-cloak] { display: none !important; }
        .animate-fade { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .calc-input { background: #111; border: 1px solid #222; border-radius: 12px; padding: 12px; width: 100%; outline: none; transition: 0.2s; color: white;}
        .calc-input:focus { border-color: #ff0000; }
        
        /* Styl dla siatki zdjęć QC */
        .qc-image-card { border-radius: 12px; overflow: hidden; border: 1px solid #222; transition: 0.3s; cursor: pointer; }
        .qc-image-card:hover { border-color: #ff0000; transform: scale(1.02); }
        .qc-image-card img { width: 100%; height: auto; display: block; }
        
        /* Spinner */
        .spinner { border: 4px solid rgba(255,0,0,0.1); border-left-color: #ff0000; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body x-data="siteHandler()">

    <nav class="fixed w-full z-50 px-6 py-5 flex justify-between items-center bg-black/80 backdrop-blur-xl border-b border-white/5">
        <div class="text-2xl font-black tracking-tighter cursor-pointer uppercase" @click="view = 'home'">
            MAKS<span class="text-red-600">REPS</span>
        </div>
        <button @click="openMenu = true" class="w-11 h-11 flex items-center justify-center bg-white/5 rounded-xl border border-white/10 hover:bg-white/10 transition text-white">
            <i class="fa-solid fa-bars-staggered text-xl"></i>
        </button>
    </nav>

    <main class="min-h-screen pt-32 pb-20 px-6">
        
        <template x-if="view === 'home'">
            <section class="flex flex-col items-center justify-center text-center py-20 animate-fade">
                <h1 class="hero-title mb-8" x-html="t.heroTitle"></h1>
                <p class="text-gray-500 max-w-xl mb-16 text-lg font-medium" x-text="t.heroSub"></p>
                <div class="flex flex-col md:flex-row gap-5 w-full max-w-sm md:max-w-none justify-center">
                    <button @click="view = 'products'" class="btn-main-red px-12 py-5 w-full md:w-auto" x-text="t.browseBtn"></button>
                    <button @click="window.open(discordLink)" class="btn-main-black px-12 py-5 w-full md:w-auto" x-text="t.discordBtn"></button>
                </div>
            </section>
        </template>

        <template x-if="view === 'shipcalc'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
                    <h2 class="text-3xl font-black uppercase mb-6">🚢 Ship <span class="text-red-600">Calculator</span></h2>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Agent</label>
                            <select x-model="calc.agent" class="calc-input">
                                <option value="kakobuy">Kakobuy (-15%)</option>
                                <option value="usfans">USFans (-30%)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-xs font-bold text-gray-500 uppercase mb-2" x-text="lang === 'pl' ? 'Waga (gramy)' : 'Weight (grams)'"></label>
                            <input type="number" x-model="calc.weight" placeholder="np. 5000" class="calc-input">
                        </div>
                        <div class="p-6 bg-white/5 rounded-2xl border border-white/10">
                            <p class="text-sm text-gray-400 mb-1" x-text="lang === 'pl' ? 'Szacowany koszt:' : 'Estimated cost:'"></p>
                            <p class="text-4xl font-black text-red-600"><span x-text="calculateShip()"></span> <span x-text="currency"></span></p>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'converter'">
            <section class="max-w-3xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-red-600/10 rounded-xl flex items-center justify-center text-red-600 text-2xl">
                            <i class="fa-solid fa-robot"></i>
                        </div>
                        <h2 class="text-3xl font-black uppercase tracking-tighter" x-text="t.convTitle"></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium" x-text="t.convDesc"></p>
                    <input type="text" x-model="convUrl" @input="convertLink()" :placeholder="t.convPlace" class="calc-input text-lg p-6 mb-8">
                    
                    <div class="space-y-3" x-show="botResult" x-cloak>
                        <div class="grid grid-cols-1 gap-4">
                            <a :href="botResult.kako" target="_blank" class="agent-btn btn-kako">
                                <img src="https://www.kakobuy.com/favicon.ico" class="w-8 h-8 object-contain">
                                <span class="flex-grow">Kakobuy</span>
                                <i class="fa-solid fa-chevron-right opacity-40"></i>
                            </a>
                            <a :href="botResult.usf" target="_blank" class="agent-btn btn-usf">
                                <img src="https://www.usfans.com/favicon.ico" class="w-8 h-8 object-contain">
                                <span class="flex-grow">USFans</span>
                                <i class="fa-solid fa-chevron-right opacity-40"></i>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'qcfinder'">
            <section class="max-w-4xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl text-center">
                    <div class="flex justify-center items-center gap-4 mb-4">
                        <div class="w-12 h-12 bg-red-600/10 rounded-xl flex items-center justify-center text-red-600 text-2xl">
                            <i class="fa-solid fa-camera-retro"></i>
                        </div>
                        <h2 class="text-3xl font-black uppercase tracking-tighter">Quality <span class="text-red-600">Checks</span></h2>
                    </div>
                    <p class="text-gray-500 mb-8 font-medium" x-text="t.qcDesc"></p>
                    
                    <div class="flex flex-col md:flex-row gap-4 justify-center mb-8">
                        <input type="text" x-model="qcInputUrl" :placeholder="t.qcPlace" class="calc-input text-lg p-4 md:w-2/3">
                        <button @click="fetchQC()" class="btn-main-red px-8 py-4 font-black uppercase tracking-widest"><i class="fa-solid fa-magnifying-glass mr-2"></i> Szukaj</button>
                    </div>

                    <div x-show="qcLoading" class="spinner"></div>

                    <div x-show="qcError" class="text-red-500 font-bold p-4 bg-red-500/10 rounded-xl" x-cloak>
                        Nie znaleziono zdjęć lub link jest niepoprawny.
                    </div>

                    <div x-show="qcPhotos.length > 0" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 mt-8" x-cloak>
                        <template x-for="photo in qcPhotos" :key="photo">
                            <div class="qc-image-card" @click="window.open(photo, '_blank')">
                                <img :src="photo" alt="QC Photo" loading="lazy">
                            </div>
                        </template>
                    </div>
                </div>
            </section>
        </template>

        <template x-if="view === 'admin'">
            <section class="max-w-4xl mx-auto animate-fade">
                <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
                    <div class="flex items-center gap-4 mb-8 border-b border-white/10 pb-6">
                        <div class="w-12 h-12 bg-gray-800 rounded-xl flex items-center justify-center text-white text-2xl">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <div>
                            <h2 class="text-3xl font-black uppercase tracking-tighter">Admin <span class="text-red-600">Panel</span></h2>
                            <p class="text-gray-500 text-sm">Zarządzaj przedmiotami na stronie</p>
                        </div>
                    </div>

                    <div class="bg-[#111] p-6 rounded-2xl border border-[#222] mb-8">
                        <h3 class="text-xl font-bold mb-4 uppercase text-gray-300"><i class="fa-solid fa-plus text-red-600 mr-2"></i> Dodaj nowy produkt</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Nazwa przedmiotu</label>
                                <input type="text" x-model="adminForm.title" placeholder="np. Jordan 4 Black Cat" class="calc-input">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Cena (w CNY/USD)</label>
                                <input type="text" x-model="adminForm.price" placeholder="np. 250 CNY" class="calc-input">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Oryginalny Link (Weidian/Taobao)</label>
                                <input type="text" x-model="adminForm.link" placeholder="https://weidian.com/..." class="calc-input">
                            </div>
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">Link do zdjęcia (Miniaturka)</label>
                                <input type="text" x-model="adminForm.img" placeholder="https://..." class="calc-input">
                            </div>
                        </div>
                        <button @click="adminAddItem()" class="btn-main-red px-6 py-3 w-full md:w-auto mt-2">DODAJ PRZEDMIOT</button>
                    </div>

                    <h3 class="text-xl font-bold mb-4 uppercase text-gray-300">Ostatnio dodane</h3>
                    <div class="space-y-3">
                        <template x-for="(item, index) in adminItems" :key="index">
                            <div class="bg-[#111] border border-[#222] p-4 rounded-xl flex items-center justify-between">
                                <div class="flex items-center gap-4">
                                    <img :src="item.img" class="w-12 h-12 rounded-lg object-cover bg-[#222]">
                                    <div>
                                        <p class="font-bold text-white" x-text="item.title"></p>
                                        <p class="text-xs text-gray-500" x-text="item.price"></p>
                                    </div>
                                </div>
                                <button @click="adminRemoveItem(index)" class="text-red-500 hover:text-red-400 p-2"><i class="fa-solid fa-trash"></i></button>
                            </div>
                        </template>
                        <div x-show="adminItems.length === 0" class="text-gray-600 text-center py-4 text-sm font-bold">
                            Brak dodanych przedmiotów.
                        </div>
                    </div>
                </div>
            </section>
        </template>

    </main>

    <div x-show="openMenu" class="fixed inset-0 z-[100]" x-cloak>
        <div class="absolute inset-0 bg-black/80 backdrop-blur-md" @click="openMenu = false"></div>
        <div class="absolute inset-y-0 right-0 w-full md:w-[400px] menu-sidebar p-8 shadow-2xl overflow-y-auto" x-transition>
            <div class="flex justify-between items-center mb-12 text-white">
                <h2 class="text-3xl font-black uppercase tracking-tighter">MENU</h2>
                <button @click="openMenu = false" class="w-10 h-10 bg-white/5 rounded-xl hover:bg-red-600 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <div class="mb-10">
                <p class="text-[10px] font-black text-gray-600 tracking-widest mb-4 uppercase" x-text="t.mainSection"></p>
                <div class="space-y-3">
                    <div @click="view = 'products'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-magnifying-glass"></i></div>
                            <span class="font-bold">Browse Finds</span>
                        </div>
                    </div>
                    <div class="menu-tile" @click="window.open(discordLink)">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box !text-[#5865F2]"><i class="fa-brands fa-discord"></i></div>
                            <span class="font-bold">Discord</span>
                        </div>
                        <span class="bg-red-600 text-[10px] font-black px-3 py-1.5 rounded-md uppercase" x-text="t.joinTag"></span>
                    </div>
                    <div @click="view = 'qcfinder'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box !text-red-500"><i class="fa-solid fa-camera-retro"></i></div>
                            <span class="font-bold">Quality Checks</span>
                        </div>
                        <span class="bg-[#111] border border-[#333] text-[9px] font-black px-2 py-1 rounded text-red-500 uppercase">NEW</span>
                    </div>
                    <div @click="view = 'converter'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-robot"></i></div>
                            <span class="font-bold">Link Converter</span>
                        </div>
                    </div>
                    <div @click="view = 'shipcalc'; openMenu = false" class="menu-tile">
                        <div class="flex items-center gap-4">
                            <div class="menu-icon-box"><i class="fa-solid fa-ship"></i></div>
                            <span class="font-bold">Ship Calculator</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="border-t border-white/5 pt-8 mb-8">
                <p class="text-[10px] font-black text-gray-600 tracking-widest mb-4 uppercase">ZARZĄDZANIE</p>
                <div @click="view = 'admin'; openMenu = false" class="menu-tile border-red-600/20 bg-red-600/5">
                    <div class="flex items-center gap-4">
                        <div class="menu-icon-box !bg-red-600/10 !text-red-500"><i class="fa-solid fa-lock"></i></div>
                        <span class="font-bold text-red-500">Admin Panel</span>
                    </div>
                </div>
            </div>

            <div class="border-t border-white/5 pt-8">
                <p class="text-[10px] font-black text-gray-600 tracking-widest mb-4 uppercase" x-text="t.settingsSection"></p>
                <div class="bg-[#111] p-6 rounded-2xl space-y-6">
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-sm" x-text="t.langLabel"></span>
                        <div class="flex gap-3">
                            <img src="https://flagcdn.com/w40/pl.png" @click="setLang('pl')" class="flag-icon" :class="lang === 'pl' && 'active'">
                            <img src="https://flagcdn.com/w40/gb.png" @click="setLang('en')" class="flag-icon" :class="lang === 'en' && 'active'">
                        </div>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-gray-400 font-bold text-sm" x-text="t.currencyLabel"></span>
                        <div class="flex bg-black p-1 rounded-lg border border-white/5 text-[10px] font-black">
                            <button @click="currency = 'PLN'" class="px-4 py-2 rounded-md transition" :class="currency === 'PLN' ? 'bg-red-600 text-white' : 'text-gray-600'">PLN</button>
                            <button @click="currency = 'USD'" class="px-4 py-2 rounded-md transition" :class="currency === 'USD' ? 'bg-red-600 text-white' : 'text-gray-600'">USD</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function siteHandler() {
            return {
                view: 'home', 
                openMenu: false, 
                lang: 'pl', 
                currency: 'PLN', 
                discordLink: 'https://discord.gg/DTb5mkpNuH',
                aff: { kakobuy: 'maksr3ps', usfans: 'DJPZ6T' },
                
                // Zmienne dla Ship Calc
                calc: { agent: 'usfans', weight: 10000 },
                
                // Zmienne dla Convertera
                convUrl: '', 
                botResult: null,

                // Zmienne dla QC Finder
                qcInputUrl: '',
                qcPhotos: [],
                qcLoading: false,
                qcError: false,

                // Zmienne dla Admin Panelu
                adminForm: { title: '', price: '', link: '', img: '' },
                adminItems: [
                    // Przykładowe dane żeby coś było widać na start
                    { title: "Jordan 4 Retro SB Pine Green", price: "330 CNY", link: "#", img: "https://via.placeholder.com/150/111/fff?text=J4" }
                ],

                t: {},
                translations: {
                    pl: {
                        heroTitle: 'THE ULTIMATE<br><span class="text-red-600">REP</span> COMMUNITY',
                        heroSub: 'Najlepsze znaleziska i największa społeczność Reps w Polsce.',
                        browseBtn: 'Przeglądaj Produkty',
                        discordBtn: 'Discord',
                        mainSection: 'GŁÓWNE',
                        settingsSection: 'USTAWIENIA',
                        langLabel: 'Język',
                        currencyLabel: 'Waluta',
                        joinTag: 'DOŁĄCZ',
                        convTitle: 'Link Converter',
                        convDesc: 'Konwertuj linki Taobao/Weidian na wersje agentów.',
                        convPlace: 'Wklej link...',
                        qcDesc: 'Wklej link Weidian / Taobao i przeglądaj zdjęcia z magazynu.',
                        qcPlace: 'Wklej link do przedmiotu...'
                    },
                    en: {
                        heroTitle: 'THE ULTIMATE<br><span class="text-red-600">REP</span> COMMUNITY',
                        heroSub: 'Best finds and the biggest Reps community.',
                        browseBtn: 'Browse Products',
                        discordBtn: 'Discord',
                        mainSection: 'MAIN',
                        settingsSection: 'SETTINGS',
                        langLabel: 'Language',
                        currencyLabel: 'Currency',
                        joinTag: 'JOIN',
                        convTitle: 'Link Converter',
                        convDesc: 'Convert Taobao/Weidian links for agents.',
                        convPlace: 'Paste link...',
                        qcDesc: 'Paste a Weidian / Taobao link to view warehouse photos.',
                        qcPlace: 'Paste item link...'
                    }
                },
                
                init() { this.setLang('pl'); },
                
                setLang(l) { 
                    this.lang = l; 
                    this.t = this.translations[l]; 
                },
                
                calculateShip() {
                    let w = this.calc.weight || 0;
                    let rate = this.calc.agent === 'usfans' ? (w * 0.05 * 0.70) : (w * 0.054 * 0.85);
                    return this.currency === 'USD' ? (rate / 4).toFixed(2) : rate.toFixed(2);
                },
                
                convertLink() {
                    let url = this.convUrl.trim();
                    if (!url) return;
                    let id = url.match(/id=(\d+)/) || url.match(/itemID=(\d+)/);
                    if (id) {
                        this.botResult = {
                            kako: `https://www.kakobuy.com/item/details?url=${encodeURIComponent(url)}&affcode=${this.aff.kakobuy}`,
                            usf: `https://www.usfans.com/product/1/${id[1]}?ref=${this.aff.usfans}`
                        };
                    }
                },

                // Funkcja QC Findera
                async fetchQC() {
                    if (!this.qcInputUrl.trim()) return;
                    
                    this.qcLoading = true;
                    this.qcError = false;
                    this.qcPhotos = [];

                    const endpoint = `https://api.xms4192.workers.dev/qc?url=${encodeURIComponent(this.qcInputUrl.trim())}`;
                    
                    try {
                        const res = await fetch(endpoint);
                        const data = await res.json();
                        
                        // Zależnie od struktury API (np. data.images)
                        const photos = data.images || data.qc_photos || data.data || [];
                        
                        if (photos.length === 0) {
                            this.qcError = true;
                        } else {
                            this.qcPhotos = photos;
                        }
                    } catch (err) {
                        this.qcError = true;
                    } finally {
                        this.qcLoading = false;
                    }
                },

                // Funkcje Panelu Admina
                adminAddItem() {
                    if(!this.adminForm.title || !this.adminForm.link) return alert("Wypełnij przynajmniej Nazwę i Link!");
                    
                    // Dodajemy do listy z góry (początku tablicy)
                    this.adminItems.unshift({
                        title: this.adminForm.title,
                        price: this.adminForm.price || "Brak",
                        link: this.adminForm.link,
                        img: this.adminForm.img || "https://via.placeholder.com/150/111/fff?text=IMG"
                    });
                    
                    // Reset formularza
                    this.adminForm = { title: '', price: '', link: '', img: '' };
                },

                adminRemoveItem(index) {
                    this.adminItems.splice(index, 1);
                }
            }
        }
    </script>
</body>
</html>
