<style>
    /* Siatka zdjęć 2x2 */
    .qc-grid { 
        display: grid; 
        grid-template-columns: repeat(2, 1fr); 
        gap: 12px; 
        margin-top: 24px; 
    }
    
    /* Styl pojedynczego kafelka zdjęcia */
    .qc-item {
        position: relative;
        border-radius: 12px;
        overflow: hidden;
        aspect-ratio: 1/1;
        border: 1px solid rgba(255,255,255,0.1);
        cursor: pointer;
        background: #111;
    }
    .qc-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.3s ease;
    }
    .qc-item:hover img {
        transform: scale(1.05);
    }
    
    /* Overlay na pełny ekran (Modal) */
    .qc-modal-overlay {
        position: fixed;
        inset: 0;
        z-index: 999;
        background: rgba(0, 0, 0, 0.9);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
    }
    
    [x-cloak] { display: none !important; }
</style>

<div x-show="fullImg" 
     class="qc-modal-overlay" 
     x-cloak 
     x-transition 
     @click="fullImg = null">
    <button class="absolute top-6 right-6 text-white text-3xl hover:text-red-600 transition">
        <i class="fa-solid fa-xmark"></i>
    </button>
    <img :src="fullImg" class="max-w-full max-h-[90vh] rounded-xl shadow-2xl border border-white/10" @click.stop>
</div>

<template x-if="view === 'qc'">
    <section class="max-w-3xl mx-auto animate-fade text-center px-4">
        <div class="p-8 bg-[#080808] border border-white/5 rounded-3xl">
            <div class="mb-6">
                <i class="fa-solid fa-camera text-red-600 text-4xl mb-4"></i>
                <h2 class="text-3xl font-black uppercase">Quality <span class="text-red-600">Checks</span></h2>
                <p class="text-gray-500 mt-2" x-text="t.qcDesc"></p>
            </div>
            
            <div class="space-y-4">
                <input type="text" x-model="qcUrl" @keydown.enter="fetchQC()" 
                       placeholder="Wklej link (Taobao, Weidian, 1688...)" 
                       class="w-full p-5 rounded-2xl bg-white/5 border border-white/10 outline-none text-center text-white focus:border-red-600/50 transition">
                
                <button @click="fetchQC()" 
                        class="btn-main-red py-5 px-10 rounded-xl w-full flex items-center justify-center gap-3 transition-all" 
                        :disabled="loadingQC">
                    <template x-if="!loadingQC">
                        <span class="font-black" x-text="t.qcBtn"></span>
                    </template>
                    <template x-if="loadingQC">
                        <i class="fa-solid fa-circle-notch animate-spin text-xl"></i>
                    </template>
                </button>
            </div>

            <div class="qc-grid" x-show="qcImages.length > 0" x-cloak>
                <template x-for="img in qcImages" :key="img">
                    <div class="qc-item" @click="fullImg = img">
                        <img :src="img" loading="lazy">
                        <div class="absolute inset-0 bg-black/10 hover:bg-transparent transition"></div>
                    </div>
                </template>
            </div>

            <div x-show="qcError" class="mt-6 p-4 bg-red-600/10 border border-red-600/20 rounded-xl text-red-500 font-bold" x-text="qcError" x-cloak></div>
        </div>
    </section>
</template>

<script>
    /* UWAGA: Poniższe zmienne i funkcję dodaj do obiektu zwracanego przez siteHandler() 
       
       Zmienne w return { ... }:
       qcUrl: '',
       qcImages: [],
       loadingQC: false,
       qcError: '',
       fullImg: null,

       Funkcja w return { ... }:
    */
    async fetchQC() {
        if (!this.qcUrl) return;
        this.loadingQC = true;
        this.qcError = '';
        this.qcImages = [];
        
        try {
            const response = await fetch(`https://api.xms4192.workers.dev/qc?url=${encodeURIComponent(this.qcUrl)}`);
            if (!response.ok) throw new Error();
            const data = await response.json();
            
            let foundImages = [];
            
            // Obsługa różnych struktur API (Taobao vs Weidian)
            if (Array.isArray(data)) {
                foundImages = data;
            } else {
                foundImages = data.images || data.data || data.photos || [];
            }

            // Mapowanie na czyste linki
            this.qcImages = foundImages.map(img => {
                if (typeof img === 'string') return img;
                if (img && typeof img === 'object') {
                    return img.url || img.image || img.pic || img.link;
                }
                return null;
            }).filter(Boolean);

            if (this.qcImages.length === 0) {
                this.qcError = 'Brak dostępnych zdjęć QC dla tego produktu.';
            }
        } catch (e) {
            this.qcError = 'Błąd połączenia z API. Upewnij się, że link jest poprawny.';
        } finally {
            this.loadingQC = false;
        }
    }
</script>
